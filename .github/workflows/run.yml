name: Run Parallel Prime Finder

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Compile
        run: javac -d out src/PrimeFinder.java src/Main.java

      - name: Run
        run: java -cp out Main

      - name: Save output
        run: java -cp out Main > output.txt 2>&1

      - name: Display result
        run: cat output.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: parallel-prime-output
          path: output.txt
